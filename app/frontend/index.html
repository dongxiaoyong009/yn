<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="%VITE_APP_LOGO_URL%" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <title>%VITE_APP_TITLE%</title>
    <meta name="description" content="%VITE_APP_DESCRIPTION%" />
    <meta name="author" content="Atoms" />

    <meta property="og:title" content="%VITE_APP_TITLE%" />
    <meta property="og:description" content="%VITE_APP_DESCRIPTION%" />
    <meta property="og:type" content="website" />
  </head>

  <body>
    <div id="root">
      <div class="boot-splash" style="position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:linear-gradient(135deg,#FFF5EB 0%,#FFE8CC 100%);font-family:system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
        <div style="text-align:center;margin-bottom:48px;">
          <div style="font-size:48px;font-weight:700;margin-bottom:12px;letter-spacing:.18em;color:#4A3728;">聊斋奇谭</div>
          <div style="font-size:16px;letter-spacing:.3em;color:#8B7355;">新国风 · 暖柔治愈</div>
        </div>
        <div style="width:288px;">
          <div style="height:12px;border-radius:999px;overflow:hidden;background:rgba(232,195,125,.3);border:1px solid #E8C37D;">
            <div style="width:28%;height:100%;border-radius:999px;background:linear-gradient(90deg,#E8C37D 0%,#D4A853 100%);box-shadow:0 0 8px rgba(232,195,125,.6);animation:bootProgress 1.2s ease-in-out infinite alternate;"></div>
          </div>
          <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;font-size:12px;color:#8B7355;">
            <span>正在启动...</span>
            <span>加载中</span>
          </div>
        </div>
      </div>
      <style>
        @keyframes bootProgress {
          from { width: 24%; }
          to { width: 72%; }
        }
      </style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
