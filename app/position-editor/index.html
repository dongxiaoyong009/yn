<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>关卡目标物位置编辑器</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="brand">关卡目标物位置编辑器</div>
        <div class="toolbar">
          <label class="field">
            <span>关卡</span>
            <select id="levelSelect"></select>
          </label>
          <label class="toggle">
            <input id="editToggle" type="checkbox" checked />
            <span>编辑模式</span>
          </label>
          <button id="saveBtn" class="primary">保存到源代码</button>
        </div>
      </header>

      <main class="layout">
        <aside class="sidebar">
          <div class="panel">
            <div class="panel-title">目标物</div>
            <div id="itemList" class="item-list"></div>
          </div>
          <div class="panel">
            <div class="panel-title">属性</div>
            <div id="itemForm" class="form"></div>
          </div>
        </aside>

        <section class="stage-wrap">
          <div class="stage-hint">拖动圆心移动，拖动边缘手柄调整点击半径</div>
          <div id="stage" class="stage">
            <div id="scene" class="scene">
              <div id="overlay" class="overlay"></div>
            </div>
          </div>
        </section>
      </main>
    </div>
    <script type="module" src="/app.js"></script>
  </body>
</html>
